name: Deploy VulnBank

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    name: SAST Scan (Semgrep)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN }}
          config: "p/owasp-top-ten"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Server
    needs: security   # <-- deploy hanya jalan kalau security selesai sukses

    environment:
      name: production
      url: https://vulnbank.org

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync code to server
        run: |
          rsync -avz --delete \
            --exclude '.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/home/${{ secrets.USERNAME }}/vuln-bank/

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            set -e

            cd /home/${{ secrets.USERNAME }}/vuln-bank

            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            docker compose down
            docker compose up -d --build
            docker image prune -f
            docker compose ps
          EOF

      - name: Health Check
        run: |
          sleep 20
          curl -f http://vulnbank.org || (echo "Health check failed" && exit 1)

